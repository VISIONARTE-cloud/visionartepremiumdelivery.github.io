<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISIONARTE - Sistema Profesional de Entrega</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1e 100%); color: #ffffff; }
        .glass { background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        h1 { font-size: 3.5rem; font-weight: 700; background: linear-gradient(135deg, #ffffff 0%, #ffd700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        h2 { font-size: 2rem; font-weight: 600; margin-bottom: 1rem; color: #ffffff; }
        h3 { font-size: 1.2rem; color: #ffffff; }
        .subtitle { font-size: 1.1rem; color: #d0d0d0; margin: 0.5rem 0 2rem 0; }
        .btn { padding: 13px 34px; border: none; border-radius: 14px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1.2px; }
        .btn-primary { background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%); color: #000; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5); }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1.5px solid rgba(255, 215, 0, 0.3); }
        .btn-secondary:hover { background: rgba(255, 215, 0, 0.12); }
        .btn-small { padding: 8px 18px; font-size: 0.9rem; }
        .btn-back { padding: 8px 14px; font-size: 1rem; margin-right: 1rem; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        input, select, textarea { width: 100%; padding: 13px 16px; background: rgba(255, 255, 255, 0.06); border: 1.5px solid rgba(255, 215, 0, 0.15); border-radius: 12px; color: #ffffff; font-size: 0.95rem; font-family: 'Poppins', sans-serif; margin-bottom: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; background: rgba(255, 255, 255, 0.1); border-color: #ffd700; box-shadow: 0 0 25px rgba(255, 215, 0, 0.25); }
        .container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .main-content { width: 100%; min-height: 100vh; overflow-y: auto; padding: 40px 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 2rem; }
        .logo { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #ffffff 0%, #ffd700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 2rem; animation: float 3s ease-in-out infinite; }
        .feature-box { background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; padding: 24px; text-align: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); overflow-y: auto; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: linear-gradient(135deg, #0a0a0a 0%, #141428 100%); border: 1.5px solid rgba(255, 215, 0, 0.15); border-radius: 28px; padding: 40px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); color: #ffffff; font-size: 28px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .tabs { display: flex; gap: 2rem; border-bottom: 2px solid rgba(255, 215, 0, 0.1); margin-bottom: 2rem; flex-wrap: wrap; }
        .tab { padding: 14px 0; border: none; background: none; color: #888888; cursor: pointer; font-weight: 600; transition: all 0.3s; position: relative; font-size: 0.9rem; }
        .tab.active { color: #ffd700; }
        .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #ffd700, #ffed4e); }
        .alert { padding: 12px 16px; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-info { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd; }
        .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }
        .alert-warning { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: #fcd34d; }
        .color-picker { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .color-option { width: 50px; height: 50px; border-radius: 10px; border: 3px solid transparent; cursor: pointer; transition: all 0.3s; }
        .color-option.selected { border-color: white; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .client-card { background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; padding: 20px; transition: all 0.3s; }
        .client-card:hover { background: rgba(255, 215, 0, 0.1); border-color: rgba(255, 215, 0, 0.4); transform: translateY(-4px); }
        .stats-card { background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; padding: 20px; text-align: center; }
        .stats-value { font-size: 2rem; font-weight: 700; color: #ffd700; }
        .stats-label { color: #888; font-size: 0.85rem; margin-top: 0.5rem; }
        .log-item { background: rgba(255, 215, 0, 0.05); border-left: 3px solid #ffd700; padding: 12px 16px; margin-bottom: 8px; border-radius: 6px; font-size: 0.9rem; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .video-item { background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .video-info { flex: 1; }
        .video-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255, 215, 0, 0.1); border-radius: 4px; margin: 1rem 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ffed4e); width: 0%; transition: width 0.3s; }
        .social-item { background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; gap: 1rem; align-items: center; }
        .social-item input { margin: 0; flex: 1; }
        .social-item button { padding: 8px 16px; margin: 0; }
        .backup-section { background: rgba(34, 197, 94, 0.08); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 12px; padding: 20px; margin-bottom: 2rem; }
        .backup-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .storage-info { background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 1rem; font-size: 0.85rem; }
        @media (max-width: 1024px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } h1 { font-size: 2rem; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 215, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.3); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        // ===== v5.3.0 STORAGE PERSISTENCE =====
        const STORAGE_KEY = 'VISIONARTE_DATA_v5_3';
        
        const COLORS = [
            { hex: '#ffd700', name: 'Oro' }, { hex: '#00ff88', name: 'Verde Neón' }, { hex: '#ff6b9d', name: 'Rosa Hot' },
            { hex: '#00bfff', name: 'Azul Cielo' }, { hex: '#9d4edd', name: 'Púrpura' }, { hex: '#ff6b35', name: 'Naranja' },
            { hex: '#ff006e', name: 'Magenta' }, { hex: '#06ffa5', name: 'Mint' }, { hex: '#00d9ff', name: 'Cyan' }, { hex: '#ff9f1c', name: 'Dorado' }
        ];

        const FONTS = [
            { name: 'Playfair Display', value: 'Playfair Display' },
            { name: 'Poppins', value: 'Poppins' },
            { name: 'Inter', value: 'Inter' },
            { name: 'Cormorant Garamond', value: 'Cormorant Garamond' }
        ];

        const DEFAULT_DATA = {
            admin: {
                password: 'admin123',
                socialLinks: [
                    { name: 'Instagram', url: 'https://instagram.com/visionarte.videos' },
                    { name: 'TikTok', url: 'https://tiktok.com/@visionarte.videos' }
                ],
                welcomeMessages: [
                    '✨ Aquí están tus proyectos en máxima calidad. Disfruta de cada detalle en 4K 50fps.',
                    '🎬 Tus videografías profesionales listas para brillar. Descarga en la mejor calidad disponible.',
                    '💎 Tu contenido merece lo mejor. Aquí lo tienes en resolución profesional 4K.',
                    '🌟 Bienvenido a tu galería privada. Acceso a tus videos en calidad premium sin compromisos.'
                ]
            },
            clients: [
                {
                    id: 'c1', name: 'LALAMOURE', email: 'contact@lalamoure.com', password: 'lala123',
                    color: '#ffd700', font: 'Playfair Display', videos: [], downloads: [],
                    registeredDate: '2024-04-01', status: 'active', deletionDate: null
                }
            ],
            archivedClients: [],
            deletedClients: [],
            movementLog: [],
            downloadLog: []
        };

        let DATA = (() => {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULT_DATA));
            } catch (e) {
                console.log('localStorage error, using default:', e);
                return JSON.parse(JSON.stringify(DEFAULT_DATA));
            }
        })();

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
            } catch (e) {
                console.error('Error guardando datos:', e);
                if (e.name === 'QuotaExceededError') {
                    alert('⚠️ Almacenamiento lleno. Exporta datos para liberar espacio.');
                }
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(DATA, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `visionarte_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function importData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        Object.assign(DATA, imported);
                        saveData();
                        resolve(true);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('Error leyendo archivo'));
                reader.readAsText(file);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function daysUntilDelete(deleteDate) {
            const today = new Date();
            const diffTime = new Date(deleteDate) - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return Math.max(0, diffDays);
        }

        class App extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    view: 'welcome',
                    navigationHistory: ['welcome'],
                    adminLogged: false,
                    clientLogged: null,
                    adminPassword: '',
                    clientPassword: '',
                    selectedClientId: '',
                    activeTab: 'clientes',
                    selectedClient: null,
                    modifyingClient: null,
                    viewClientVideos: null,
                    videoTitle: '',
                    selectedUploadClient: '',
                    uploadProgress: 0,
                    uploadStatus: '',
                    currentPassword: '',
                    newPassword: '',
                    confirmPassword: '',
                    newSocialName: '',
                    newSocialUrl: '',
                    newClient: { name: '', email: '', password: '', color: '#ffd700', font: 'Playfair Display' }
                };
                this.fileInputRef = React.createRef();
                this.importFileRef = React.createRef();
            }

            navigateTo = (newView) => {
                this.setState(prev => ({
                    navigationHistory: [...prev.navigationHistory, newView],
                    view: newView
                }));
            }

            goBack = () => {
                this.setState(prev => {
                    if (prev.navigationHistory.length > 1) {
                        const newHistory = [...prev.navigationHistory];
                        newHistory.pop();
                        return {
                            navigationHistory: newHistory,
                            view: newHistory[newHistory.length - 1]
                        };
                    }
                    return prev;
                });
            }

            handleAdminLogin = (e) => {
                e.preventDefault();
                if (this.state.adminPassword === DATA.admin.password) {
                    this.setState({ adminLogged: true, adminPassword: '' });
                    this.navigateTo('admin-panel');
                } else {
                    alert('❌ Contraseña incorrecta');
                }
            }

            handleClientLogin = (e) => {
                e.preventDefault();
                const client = DATA.clients.find(c => c.id === this.state.selectedClientId && c.password === this.state.clientPassword);
                if (client && client.status === 'active') {
                    DATA.movementLog.push({ action: `Accedió: ${client.name}`, timestamp: new Date().toLocaleString('es-ES') });
                    saveData();
                    this.setState({ clientLogged: client, clientPassword: '', selectedClientId: '' });
                    this.navigateTo('client-portal');
                } else {
                    alert('❌ Acceso denegado');
                }
            }

            handleCreateClient = (e) => {
                e.preventDefault();
                if (!this.state.newClient.name || !this.state.newClient.email || !this.state.newClient.password) {
                    alert('❌ Completa todos los campos');
                    return;
                }
                const client = {
                    id: `c${Date.now()}`, 
                    ...this.state.newClient, 
                    videos: [], 
                    downloads: [],
                    registeredDate: new Date().toLocaleDateString('es-ES'), 
                    status: 'active', 
                    deletionDate: null
                };
                DATA.clients.push(client);
                DATA.movementLog.push({ action: `Creó cliente: ${this.state.newClient.name}`, timestamp: new Date().toLocaleString('es-ES') });
                saveData();
                alert(`✅ Carpeta creada\n📧 ${this.state.newClient.email}\n🔐 ${this.state.newClient.password}`);
                this.setState({ newClient: { name: '', email: '', password: '', color: '#ffd700', font: 'Playfair Display' } });
                this.forceUpdate();
            }

            handleUploadFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!this.state.selectedUploadClient) {
                    alert('❌ Selecciona cliente');
                    return;
                }

                const client = DATA.clients.find(c => c.id === this.state.selectedUploadClient);
                if (!client) return;

                this.setState({ uploadStatus: `Subiendo ${file.name}...`, uploadProgress: 0 });

                const blobUrl = URL.createObjectURL(file);
                
                client.videos.push({
                    name: this.state.videoTitle || file.name,
                    size: file.size,
                    uploadedDate: new Date().toLocaleDateString('es-ES'),
                    videoUrl: blobUrl,
                    isLocal: true
                });

                DATA.movementLog.push({ action: `Subió: ${this.state.videoTitle || file.name} a ${client.name}`, timestamp: new Date().toLocaleString('es-ES') });
                saveData();
                
                this.setState({ 
                    videoTitle: '', 
                    selectedUploadClient: '',
                    uploadStatus: `✅ Video subido: ${file.name}`,
                    uploadProgress: 100
                });
                
                setTimeout(() => {
                    this.setState({ uploadStatus: '', uploadProgress: 0 });
                    alert(`✅ Video subido\n📊 ${formatFileSize(file.size)}`);
                }, 1500);

                this.fileInputRef.current.value = '';
                this.forceUpdate();
            }

            handleChangeAdminPassword = (e) => {
                e.preventDefault();
                if (this.state.currentPassword !== DATA.admin.password) {
                    alert('❌ Contraseña actual incorrecta');
                    return;
                }
                if (this.state.newPassword !== this.state.confirmPassword) {
                    alert('❌ Las contraseñas no coinciden');
                    return;
                }
                if (this.state.newPassword.length < 6) {
                    alert('❌ Contraseña debe tener al menos 6 caracteres');
                    return;
                }
                DATA.admin.password = this.state.newPassword;
                DATA.movementLog.push({ action: `Cambió contraseña admin`, timestamp: new Date().toLocaleString('es-ES') });
                saveData();
                alert('✅ Contraseña actualizada');
                this.setState({ currentPassword: '', newPassword: '', confirmPassword: '' });
            }

            handleAddSocialLink = (e) => {
                e.preventDefault();
                if (!this.state.newSocialName || !this.state.newSocialUrl) {
                    alert('❌ Completa nombre y URL');
                    return;
                }
                DATA.admin.socialLinks.push({
                    name: this.state.newSocialName,
                    url: this.state.newSocialUrl
                });
                DATA.movementLog.push({ action: `Añadió red: ${this.state.newSocialName}`, timestamp: new Date().toLocaleString('es-ES') });
                saveData();
                alert(`✅ ${this.state.newSocialName} añadido`);
                this.setState({ newSocialName: '', newSocialUrl: '' });
                this.forceUpdate();
            }

            handleRemoveSocialLink = (index) => {
                const name = DATA.admin.socialLinks[index].name;
                DATA.admin.socialLinks.splice(index, 1);
                DATA.movementLog.push({ action: `Eliminó red: ${name}`, timestamp: new Date().toLocaleString('es-ES') });
                saveData();
                alert(`✅ ${name} eliminado`);
                this.forceUpdate();
            }

            handleArchiveClient = (clientId) => {
                const client = DATA.clients.find(c => c.id === clientId);
                if (client) {
                    client.status = 'archived';
                    DATA.archivedClients.push({...client});
                    DATA.movementLog.push({ action: `Archivó: ${client.name}`, timestamp: new Date().toLocaleString('es-ES') });
                    saveData();
                    alert(`✅ ${client.name} archivado`);
                    this.setState({ selectedClient: null });
                    this.forceUpdate();
                }
            }

            handleDeleteClient = (clientId) => {
                const client = DATA.clients.find(c => c.id === clientId);
                if (client) {
                    client.status = 'deleted';
                    client.deletionDate = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
                    DATA.deletedClients.push({...client});
                    DATA.movementLog.push({ action: `Eliminó (30d): ${client.name}`, timestamp: new Date().toLocaleString('es-ES') });
                    saveData();
                    alert(`✅ ${client.name} se eliminará en 30 días`);
                    this.setState({ selectedClient: null });
                    this.forceUpdate();
                }
            }

            handleModifyClient = (client) => {
                this.setState({ modifyingClient: { ...client } });
            }

            handleSaveModifyClient = (e) => {
                e.preventDefault();
                const client = DATA.clients.find(c => c.id === this.state.modifyingClient.id);
                if (client) {
                    client.name = this.state.modifyingClient.name;
                    client.email = this.state.modifyingClient.email;
                    client.color = this.state.modifyingClient.color;
                    client.font = this.state.modifyingClient.font;
                    DATA.movementLog.push({ action: `Modificó datos: ${client.name}`, timestamp: new Date().toLocaleString('es-ES') });
                    saveData();
                    alert('✅ Datos del cliente actualizados');
                    this.setState({ modifyingClient: null, selectedClient: null });
                    this.forceUpdate();
                }
            }

            handleExportData = () => {
                exportData();
                alert('✅ Datos exportados a JSON');
            }

            handleImportData = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    await importData(file);
                    alert('✅ Datos importados correctamente');
                    this.forceUpdate();
                } catch (err) {
                    alert(`❌ Error importando: ${err.message}`);
                }
                this.importFileRef.current.value = '';
            }

            downloadVideo = (video) => {
                if (video.videoUrl) {
                    const link = document.createElement('a');
                    link.href = video.videoUrl;
                    link.download = video.name || 'video.mp4';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    DATA.downloadLog.push({ action: `Descargó: ${video.name}`, timestamp: new Date().toLocaleString('es-ES') });
                    saveData();
                }
            }

            openVideoPreview = (video) => {
                if (video.videoUrl) {
                    window.open(video.videoUrl, '_blank');
                }
            }

            render() {
                const { view, adminLogged, clientLogged } = this.state;

                return React.createElement('div', { style: { background: 'linear-gradient(135deg, #0a0a0a 0%, #0f0f1e 100%)' } },
                    view === 'welcome' && React.createElement(WelcomeScreen, { navigateTo: this.navigateTo }),
                    view === 'admin-login' && React.createElement(AdminLoginScreen, {
                        adminPassword: this.state.adminPassword,
                        setAdminPassword: (val) => this.setState({ adminPassword: val }),
                        handleAdminLogin: this.handleAdminLogin,
                        navigateTo: this.navigateTo,
                        goBack: this.goBack
                    }),
                    view === 'admin-panel' && adminLogged && React.createElement(AdminPanel, {
                        navigateTo: this.navigateTo,
                        setAdminLogged: (val) => this.setState({ adminLogged: val }),
                        goBack: this.goBack,
                        state: this.state,
                        setState: (newState) => this.setState(newState),
                        handleCreateClient: this.handleCreateClient,
                        handleArchiveClient: this.handleArchiveClient,
                        handleDeleteClient: this.handleDeleteClient,
                        handleUploadFile: this.handleUploadFile,
                        handleChangeAdminPassword: this.handleChangeAdminPassword,

                    React.createElement('button', { className: 'btn btn-secondary btn-small', onClick: () => navigateTo('welcome'), style: { marginBottom: '1rem', width: '100%', background: '#f0f0f0', color: '#000', border: '2px solid #ddd' } }, '← Volver'),
                    React.createElement('h2', { style: { color: '#000', textAlign: 'center' } }, 'VISIONARTE'),
                    React.createElement('p', { style: { color: '#666', textAlign: 'center', marginBottom: '2rem' } }, 'Acceso Cliente'),
                    React.createElement('form', { onSubmit: handleClientLogin, style: { display: 'grid', gap: '1rem' } },
                        React.createElement('select', { value: selectedClientId, onChange: (e) => setSelectedClientId(e.target.value), required: true, style: { background: '#f0f0f0', color: '#000', border: '2px solid #ddd', marginBottom: 0 } },
                            React.createElement('option', { value: '' }, '-- Tu carpeta --'),
                            clients.filter(c => c.status === 'active').map(c => React.createElement('option', { key: c.id, value: c.id }, c.name))
                        ),
                        React.createElement('input', { type: 'password', placeholder: 'Contraseña', value: clientPassword, onChange: (e) => setClientPassword(e.target.value), required: true, style: { background: '#f0f0f0', color: '#000', border: '2px solid #ddd' } }),
                        React.createElement('button', { type: 'submit', className: 'btn btn-primary', style: { width: '100%', marginBottom: 0 } }, 'Acceder')
                    )
                )
            );
        }

        function ClientPortal({ client, navigateTo, setClientLogged, goBack, downloadVideo, openVideoPreview }) {
            const randomMsg = DATA.admin.welcomeMessages[Math.floor(Math.random() * DATA.admin.welcomeMessages.length)];

            return React.createElement('div', { className: 'main-content' },
                React.createElement('div', { style: { maxWidth: '1200px', margin: '0 auto' } },
                    React.createElement('div', { className: 'header-top' },
                        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '1rem' } },
                            React.createElement('button', { className: 'btn btn-secondary btn-back', onClick: goBack }, '← Atrás'),
                            React.createElement('div', null,
                                React.createElement('div', { className: 'logo', style: { fontSize: '2rem' } },
                                    React.createElement('span', { className: 'logo-icon' }, '🎬'),
                                    React.createElement('span', null, 'VISIONARTE')
                                ),
                                React.createElement('div', { style: { color: client.color, fontWeight: '600', marginTop: '0.5rem', fontFamily: client.font } }, `📁 ${client.name}`)
                            )
                        ),
                        React.createElement('button', { className: 'btn btn-secondary btn-small', onClick: () => { setClientLogged(null); navigateTo('welcome'); } }, 'Salir')
                    ),

                    React.createElement('div', { style: { background: 'rgba(255, 215, 0, 0.08)', borderLeft: '4px solid #ffd700', padding: '20px', borderRadius: '12px', marginBottom: '2rem', fontFamily: client.font } },
                        React.createElement('strong', { style: { color: client.color } }, `✨ ${randomMsg}`)
                    ),

                    client.videos.length === 0 ? 
                        React.createElement('div', { className: 'glass', style: { padding: '60px', textAlign: 'center' } },
                            React.createElement('div', { style: { fontSize: '3rem', marginBottom: '1rem' } }, '🎬'),
                            React.createElement('h2', null, 'Tus videos en 4K'),
                            React.createElement('p', { className: 'subtitle' }, 'Tu videógrafo está preparando tu contenido.')
                        ) :
                        React.createElement('div', { className: 'glass', style: { padding: '30px' } },
                            React.createElement('h2', null, 'Tus Archivos 📹'),
                            client.videos.map((video, idx) => React.createElement('div', { key: idx, className: 'video-item' },
                                React.createElement('div', { className: 'video-info' },
                                    React.createElement('div', { style: { color: '#ffd700', fontWeight: '600', marginBottom: '0.5rem' } }, video.name),
                                    React.createElement('div', { style: { color: '#888', fontSize: '0.85rem' } }, `${formatFileSize(video.size || 0)} • ${video.uploadedDate}`)
                                ),
                                React.createElement('div', { className: 'video-buttons' },
                                    React.createElement('button', { className: 'btn btn-primary btn-small', onClick: () => openVideoPreview(video) }, '👁️ Ver'),
                                    React.createElement('button', { className: 'btn btn-primary btn-small', onClick: () => downloadVideo(video) }, '⬇️ Descargar')
                                )
                            ))
                        ),

                    DATA.admin.socialLinks.length > 0 && React.createElement('div', { style: { marginTop: '3rem', textAlign: 'center' } },
                        React.createElement('p', { style: { color: '#b0b0b0', marginBottom: '1.5rem' } }, 'Síguenos:'),
                        React.createElement('div', { style: { display: 'flex', gap: '1.5rem', justifyContent: 'center', flexWrap: 'wrap' } },
                            DATA.admin.socialLinks.map((social, idx) => React.createElement('a', { key: idx, href: social.url, target: '_blank', rel: 'noopener noreferrer', style: { color: '#ffd700', textDecoration: 'none', fontWeight: '600' } }, social.name))
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
    </script>
</body>
</html>
